{% extends "base.html" %}
{% block title %}Editar Cliente{% endblock %}
{% block page_title %}Editar Cliente{% endblock %}

{% block topbar_actions %}
<a href="/clientes" class="btn btn-secondary" style="font-size:13px;">← Voltar</a>
{% endblock %}

{% block content %}
<div class="card" style="max-width:700px;">
    <h3 style="margin-top:0; color:#f59e0b;">✏️ Editar: {{ cliente['nome'] }}</h3>
    <form method="POST">
        <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px;">
            <div>
                <label class="form-label">Nome *</label>
                <input type="text" name="nome" value="{{ cliente['nome'] }}" required class="form-input">
            </div>
            <div>
                <label class="form-label">CPF / CNPJ</label>
                <input type="text" name="cpf_cnpj" value="{{ cliente['cpf_cnpj'] or '' }}" class="form-input">
            </div>
            <div>
                <label class="form-label">Telefone</label>
                <input type="text" name="telefone" value="{{ cliente['telefone'] or '' }}" class="form-input">
            </div>
            <div>
                <label class="form-label">E-mail</label>
                <input type="email" name="email" value="{{ cliente['email'] or '' }}" class="form-input">
            </div>
            <div>
                <label class="form-label">Rua</label>
                <input type="text" name="rua" value="{{ cliente['rua'] or '' }}" class="form-input">
            </div>
            <div>
                <label class="form-label">Número</label>
                <input type="text" name="numero" value="{{ cliente['numero'] or '' }}" class="form-input">
            </div>
            <div>
                <label class="form-label">Bairro</label>
                <input type="text" name="bairro" value="{{ cliente['bairro'] or '' }}" class="form-input">
            </div>
            <div>
                <label class="form-label">Cidade</label>
                <input type="text" name="cidade" value="{{ cliente['cidade'] or '' }}" class="form-input">
            </div>
            <div>
                <label class="form-label">CEP</label>
                <input type="text" name="cep" value="{{ cliente['cep'] or '' }}" class="form-input">
            </div>
            <div style="grid-column: 1 / -1;">
                <label class="form-label">Observações</label>
                <textarea name="observacoes" rows="3"
                    style="width:100%; background:#111; border:1px solid #333; border-radius:8px; color:#fff; padding:9px 14px; font-size:13px; box-sizing:border-box; resize:vertical;">{{ cliente['observacoes'] or '' }}</textarea>
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:18px;">
            <button type="submit" class="btn">💾 Salvar Alterações</button>
            <a href="/clientes" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

<style>
.form-label { display:block; font-size:12px; color:#aaa; margin-bottom:4px; }
.form-input  { width:100%; padding:9px 14px; background:#111; border:1px solid #333; border-radius:8px; color:#fff; font-size:13px; box-sizing:border-box; }
.form-input:focus { outline:none; border-color:#f59e0b; }
</style>
{% endblock %}
