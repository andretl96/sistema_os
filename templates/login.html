<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — TERRATECH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg-dark, #0f0f0f); }
        .login-box { background: var(--bg-card, #1a1a1a); border: 1px solid var(--border, #2a2a2a); border-radius: 12px; padding: 40px; width: 340px; }
        .login-logo { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; color: var(--accent, #f59e0b); margin-bottom: 8px; }
        .login-sub { color: #888; font-size: 13px; margin-bottom: 28px; }
        .login-box input { width: 100%; padding: 10px 14px; margin-bottom: 14px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 11px; background: var(--accent, #f59e0b); color: #000; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; }
        .login-box button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">TERRATECH 🌐</div>
        <div class="login-sub">Sistema de Ordens de Serviço</div>
        <form method="POST">
            <input type="text" name="user" placeholder="Usuário" required autofocus>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
