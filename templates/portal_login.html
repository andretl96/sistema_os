<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Cliente — TERRATECH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { display:flex; justify-content:center; align-items:center; min-height:100vh; background:#0f0f0f; }
        .login-box { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:14px; padding:44px 40px; width:360px; }
        .login-logo { font-family:'Rajdhani',sans-serif; font-size:26px; font-weight:700; color:#f59e0b; margin-bottom:4px; }
        .login-badge { display:inline-block; background:#3b82f622; color:#60a5fa; border:1px solid #3b82f644; border-radius:20px; font-size:11px; padding:3px 10px; margin-bottom:20px; }
        .login-sub { color:#888; font-size:13px; margin-bottom:28px; }
        .field-label { color:#aaa; font-size:12px; font-weight:500; margin-bottom:5px; display:block; }
        .login-box input { width:100%; padding:10px 14px; margin-bottom:16px; background:#111; border:1px solid #333; border-radius:8px; color:#fff; font-size:14px; box-sizing:border-box; transition:border .2s; }
        .login-box input:focus { outline:none; border-color:#f59e0b55; }
        .login-box button { width:100%; padding:12px; background:#f59e0b; color:#000; font-weight:700; border:none; border-radius:8px; cursor:pointer; font-size:15px; margin-top:4px; }
        .login-box button:hover { opacity:.9; }
        .divider { border:none; border-top:1px solid #2a2a2a; margin:20px 0; }
        .link-admin { text-align:center; font-size:12px; color:#555; }
        .link-admin a { color:#f59e0b; text-decoration:none; }
        .alert-error { background:#dc262622; border:1px solid #ef444455; color:#ef4444; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; }
        .alert-success { background:#16a34a22; border:1px solid #22c55e55; color:#22c55e; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">TERRATECH 🌐</div>
        <div class="login-badge">👤 Área do Cliente</div>
        <div class="login-sub">Acompanhe suas ordens de serviço</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST">
            <label class="field-label">CPF / CNPJ</label>
            <input type="text" name="cpf_cnpj" placeholder="000.000.000-00" required autofocus>
            <label class="field-label">Telefone cadastrado</label>
            <input type="text" name="telefone" placeholder="(00) 00000-0000" required>
            <button type="submit">🔐 Entrar na Área do Cliente</button>
        </form>

        <hr class="divider">
        <div class="link-admin">
            É técnico ou administrador?
            <a href="/login">Acesso interno →</a>
        </div>
    </div>
</body>
</html>
