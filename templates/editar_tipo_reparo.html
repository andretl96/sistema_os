{% extends "base.html" %}
{% block title %}Editar Tipo de Reparo{% endblock %}
{% block page_title %}Editar Tipo de Reparo{% endblock %}

{% block topbar_actions %}
<a href="/tipos_reparo" class="btn btn-secondary" style="font-size:13px;">← Voltar</a>
{% endblock %}

{% block content %}
<div class="card" style="max-width:500px;">
    <h3 style="margin-top:0; color:#f59e0b;">✏️ {{ tipo['nome'] }}</h3>
    <form method="POST" style="display:flex; flex-direction:column; gap:14px;">
        <div>
            <label class="form-label">Nome do Serviço *</label>
            <input type="text" name="nome" value="{{ tipo['nome'] }}" required class="form-input">
        </div>
        <div>
            <label class="form-label">Descrição</label>
            <input type="text" name="descricao" value="{{ tipo['descricao'] or '' }}" class="form-input">
        </div>
        <div>
            <label class="form-label">Valor Padrão (R$)</label>
            <input type="text" name="valor_padrao" value="{{ tipo['valor_padrao'] }}" class="form-input">
        </div>
        <div style="display:flex; gap:10px; margin-top:6px;">
            <button type="submit" class="btn">💾 Salvar</button>
            <a href="/tipos_reparo" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

<style>
.form-label { display:block; font-size:12px; color:#aaa; margin-bottom:4px; }
.form-input  { width:100%; padding:9px 14px; background:#111; border:1px solid #333; border-radius:8px; color:#fff; font-size:13px; box-sizing:border-box; }
</style>
{% endblock %}
